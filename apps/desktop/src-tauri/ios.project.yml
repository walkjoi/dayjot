name: reflect-open
options:
  bundleIdPrefix: app.reflect
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Reflect
      PRODUCT_BUNDLE_IDENTIFIER: app.reflect.ios
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: 789ULN5MZB
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  reflect-open_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      # Build artifacts (libapp.a) land here; without an explicit `none`,
      # regenerating after a build sweeps them into Copy Bundle Resources,
      # shipping the Rust static archive inside the app bundle.
      - path: Externals
        buildPhase: none
      - path: reflect-open_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: reflect-open_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        # The graph lives in Documents/ — expose it in the Files app so the
        # user can see, copy, and back up their markdown (Plan 19).
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # Reflect only uses exempt encryption (standard HTTPS/Git transport and
        # OS keychain storage), so App Store Connect should not ask for export
        # compliance answers on every TestFlight upload.
        ITSAppUsesNonExemptEncryption: false
        # Apple Contacts integration: read-only CNContactStore lookups for
        # person notes; the string is shown on the iOS permission prompt.
        NSContactsUsageDescription: Reflect reads your contacts to suggest details for person notes. Nothing is stored or sent anywhere.
        # Mirrored from src-tauri/Info.plist (which merges at build) so that
        # xcodegen regens keep them in the committed generated Info.plist
        # instead of silently dropping them.
        NSMicrophoneUsageDescription: Reflect uses the microphone to record audio memos that are transcribed into your daily note.
        NSCalendarsFullAccessUsageDescription: Reflect reads your calendar to show the day's meetings beside your daily note. Access is read-only and stays on this device.
        NSCalendarsUsageDescription: Reflect reads your calendar to show the day's meetings beside your daily note. Access is read-only and stays on this device.
        # Audio memos keep recording through screen lock and backgrounding
        # (audio-memos wave 2). The recording plugin activates the audio
        # session only while a recording is live, so the mode never keeps the
        # app running outside an actual capture.
        UIBackgroundModes: [audio]
        # The `reflect://` scheme (audio-memos wave 3): the lock-screen
        # widget opens `reflect://record-audio`, which the Rust shell hands
        # to the recording plugin's action queue. Desktop registers the same
        # scheme through the deep-link plugin config in tauri.conf.json.
        CFBundleURLTypes:
          - CFBundleURLName: app.reflect.ios
            CFBundleURLSchemes: [reflect]
        # The recording Live Activity (audio-memos wave 3).
        NSSupportsLiveActivities: true
        # Home-screen quick action (audio-memos wave 3); handled by the
        # recording plugin via the shortcut-item delegate hook.
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: app.reflect.record-audio
            UIApplicationShortcutItemTitle: Record audio
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeAudio
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iCloud Drive document storage (Plan 21): the graph can live in the
        # app's iCloud container so notes sync across devices. Public document
        # scope surfaces it as "Reflect" in the Files app and in Finder's
        # iCloud Drive, where the desktop app opens the same folder.
        NSUbiquitousContainers:
          iCloud.app.reflect:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Reflect
            NSUbiquitousContainerSupportedFolderLevels: Any
        # Rendered by Tauri from `version` in tauri.conf.json (the prerelease
        # tag is stripped — Apple requires three dot-separated integers), so the
        # version lives in one place and never drifts. Do not hardcode a literal.
        CFBundleShortVersionString: {{apple.bundle-version-short}}
        CFBundleVersion: {{apple.bundle-version}}
    # Entitlement contents live HERE, not in the .entitlements files: xcodegen
    # (and `tauri ios init`, which runs it) rewrites those files from these
    # properties on every regen — with no properties they were wiped to empty
    # dicts (see docs/porting/reflect-mobile/share-extension.md).
    #
    # iCloud Drive document storage (Plan 21). CloudDocuments only: the graph
    # is plain markdown in the app's container; there is no CloudKit database.
    # The App Group is shared with ShareExtension: the share sheet spools
    # capture envelopes into the container's inbox/, and the app relays them
    # into the graph's .reflect/inbox/ on launch/foreground (Plan 11).
    entitlements:
      path: reflect-open_iOS/reflect-open_iOS.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.reflect
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.app.reflect
        com.apple.security.application-groups:
          - group.app.reflect
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        SWIFT_VERSION: "5.0"
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      # The share-sheet capture extension (Plan 11's iOS producer): embedded
      # into the app bundle and signed with it.
      - target: ShareExtension
        embed: true
      # The audio-memo widget extension (wave 3): lock-screen record widget
      # + the recording Live Activity; embedded and signed with the app.
      - target: RecordingWidget
        embed: true
      - framework: libapp.a
        embed: false
      # libgit2 (vendored into libapp.a) needs zlib and iconv at the final
      # Xcode link — cargo's `rustc-link-lib` directives don't reach
      # xcodebuild. iconv backs libgit2's Apple filename-precompose support.
      - sdk: libz.tbd
      - sdk: libiconv.tbd
      # objc2-contacts' link directive doesn't reach xcodebuild either.
      - sdk: Contacts.framework
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: CI=true pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
  # The share-sheet capture extension: saves links/text shared from any app
  # into the App Group inbox (`group.app.reflect`), entirely offline; the main
  # app relays + drains on next launch/foreground (Plan 11's envelope model).
  # Swift only — no Rust, no webview, no network.
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension/ShareViewController.swift
      - path: ShareExtension/ShareState.swift
      - path: ShareExtension/ShareView.swift
      - path: ShareExtension/CaptureInbox.swift
      # The Safari preprocessor (title/URL/selection/meta description); a
      # bundle resource the NSExtension attributes reference by base name.
      - path: ShareExtension/ExtensionClass.js
        buildPhase: resources
    info:
      path: ShareExtension/Info.plist
      properties:
        # The share sheet's row label (the icon comes from the host app).
        CFBundleDisplayName: Reflect
        CFBundleShortVersionString: {{apple.bundle-version-short}}
        CFBundleVersion: {{apple.bundle-version}}
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          # Storyboard-less principal class; `@objc(ShareViewController)`
          # pins the runtime name the plist references.
          NSExtensionPrincipalClass: ShareViewController
          NSExtensionAttributes:
            # Dictionary version 2 allows subset matching — Chrome shares a
            # URL *and* text, which version 1's exact match would refuse
            # (V1 parity; see the porting doc).
            NSExtensionActivationRule:
              NSExtensionActivationDictionaryVersion: 2
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
            NSExtensionJavaScriptPreprocessingFile: ExtensionClass
    # The extension's only capability: the App Group container it spools
    # capture envelopes into. Must match the main app's entry — the app reads
    # the same container to relay envelopes into the graph. Contents declared
    # here so xcodegen regens rewrite the .entitlements file correctly.
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.reflect
    settings:
      base:
        PRODUCT_NAME: ShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: app.reflect.ios.share
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 789ULN5MZB
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1,2
    postBuildScripts:
      # Tauri's App Store Connect API-key flow (CI TestFlight builds) archives
      # with code signing disabled, then dummy-signs only the app binary before
      # export. Xcode's export re-signing preserves only entitlements already
      # present in a signature, so an unsigned appex ships without the App
      # Group entitlement — the container lookup returns nil and every share
      # fails with "Couldn't save" (tauri-cli mobile/ios/build.rs). Ad-hoc
      # signing the extension with its entitlements here keeps them through
      # export; properly signed builds never enter the branch.
      - script: |
          if [ "${CODE_SIGNING_ALLOWED:-YES}" = "NO" ]; then
            /usr/bin/codesign --force --sign - \
              --entitlements "${SRCROOT:?}/ShareExtension/ShareExtension.entitlements" \
              "${CODESIGNING_FOLDER_PATH:?}"
          fi
        name: Preserve entitlements on skip-codesign builds
        basedOnDependencyAnalysis: false

  # The audio-memo widget extension (wave 3): the lock-screen / home-screen
  # "record" widget plus the recording Live Activity. Swift only — no Rust,
  # no webview. Two sources are shared by path: the Live Activity attributes
  # (also compiled into the recording plugin — ActivityKit matches app and
  # widget by type name) and the stop LiveActivityIntent (also compiled into
  # the app target, where it executes).
  RecordingWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: RecordingWidget/RecordingWidgetBundle.swift
      - path: RecordingWidget/RecordAudioWidget.swift
      - path: RecordingWidget/RecordingActivityWidget.swift
      - path: Sources/reflect-open/StopRecordingLiveActivityIntent.swift
      - path: ../../../../../plugins/tauri-plugin-recording/ios/Sources/RecordingActivityAttributes.swift
    info:
      path: RecordingWidget/Info.plist
      properties:
        CFBundleDisplayName: Reflect
        CFBundleShortVersionString: {{apple.bundle-version-short}}
        CFBundleVersion: {{apple.bundle-version}}
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    # The widget needs no capability of its own, but the release pipeline
    # asserts every appex carries the App Group (release-ios.mjs), and the
    # skip-codesign ad-hoc phase below must have entitlements to preserve —
    # exactly like ShareExtension.
    entitlements:
      path: RecordingWidget/RecordingWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.reflect
    settings:
      base:
        PRODUCT_NAME: RecordingWidget
        PRODUCT_BUNDLE_IDENTIFIER: app.reflect.ios.widgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 789ULN5MZB
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1,2
    postBuildScripts:
      # Same skip-codesign entitlement preservation as ShareExtension: CI
      # TestFlight builds archive unsigned, and export re-signing only keeps
      # entitlements already present in a signature.
      - script: |
          if [ "${CODE_SIGNING_ALLOWED:-YES}" = "NO" ]; then
            /usr/bin/codesign --force --sign - \
              --entitlements "${SRCROOT:?}/RecordingWidget/RecordingWidget.entitlements" \
              "${CODESIGNING_FOLDER_PATH:?}"
          fi
        name: Preserve entitlements on skip-codesign builds
        basedOnDependencyAnalysis: false
