name: dayjot-desktop
options:
  bundleIdPrefix: app.dayjot
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  # The dev flavor (mirrors the desktop's tauri.dev.conf.json flavor): debug
  # builds get their own bundle id, home-screen name, icon, and App Group so
  # a `tauri ios dev` install coexists with the TestFlight/App Store app.
  # `tauri ios dev` always builds the debug configuration and the TestFlight
  # pipeline always builds release, so the configuration is the flavor axis.
  # DAYJOT_DISPLAY_NAME feeds CFBundleDisplayName via Info.plist expansion.
  app:
    base:
      PRODUCT_NAME: DayJot
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: 789ULN5MZB
    configs:
      debug:
        PRODUCT_BUNDLE_IDENTIFIER: app.dayjot.ios.dev
        DAYJOT_DISPLAY_NAME: DayJot Dev
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev
        # The dev App Group, no iCloud; see the entitlements comment on the
        # dayjot-desktop_iOS target.
        CODE_SIGN_ENTITLEMENTS: dayjot-desktop_iOS/dayjot-desktop_iOS.dev.entitlements
      release:
        PRODUCT_BUNDLE_IDENTIFIER: app.dayjot.ios
        DAYJOT_DISPLAY_NAME: DayJot
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: dayjot-desktop_iOS/dayjot-desktop_iOS.entitlements
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  dayjot-desktop_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      # Build artifacts (libapp.a) land here; without an explicit `none`,
      # regenerating after a build sweeps them into Copy Bundle Resources,
      # shipping the Rust static archive inside the app bundle.
      - path: Externals
        buildPhase: none
      - path: dayjot-desktop_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: dayjot-desktop_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        # The graph lives in Documents/ — expose it in the Files app so the
        # user can see, copy, and back up their markdown (Plan 19).
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # DayJot only uses exempt encryption (standard HTTPS/Git transport and
        # OS keychain storage), so App Store Connect should not ask for export
        # compliance answers on every TestFlight upload.
        ITSAppUsesNonExemptEncryption: false
        # Apple Contacts integration: read-only CNContactStore lookups for
        # person notes; the string is shown on the iOS permission prompt.
        NSContactsUsageDescription: DayJot reads your contacts to suggest details for person notes. Nothing is stored or sent anywhere.
        # Mirrored from src-tauri/Info.plist (which merges at build) so that
        # xcodegen regens keep them in the committed generated Info.plist
        # instead of silently dropping them.
        NSCalendarsFullAccessUsageDescription: DayJot reads your calendar to show the day's meetings beside your daily note. Access is read-only and stays on this device.
        NSCalendarsUsageDescription: DayJot reads your calendar to show the day's meetings beside your daily note. Access is read-only and stays on this device.
        # The `dayjot://` scheme. Desktop registers the same scheme through
        # the deep-link plugin config in tauri.conf.json. Both flavors
        # register it: scheme links from other apps are ambiguous only when
        # both are installed.
        CFBundleURLTypes:
          - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER)
            CFBundleURLSchemes: [dayjot]
        CFBundleDisplayName: $(DAYJOT_DISPLAY_NAME)
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iCloud Drive document storage (Plan 21): the graph can live in the
        # app's iCloud container so notes sync across devices. Public document
        # scope surfaces it as "DayJot" in the Files app and in Finder's
        # iCloud Drive, where the desktop app opens the same folder.
        NSUbiquitousContainers:
          iCloud.app.dayjot:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: DayJot
            NSUbiquitousContainerSupportedFolderLevels: Any
        # Rendered by Tauri from `version` in tauri.conf.json (the prerelease
        # tag is stripped — Apple requires three dot-separated integers), so the
        # version lives in one place and never drifts. Do not hardcode a literal.
        CFBundleShortVersionString: {{apple.bundle-version-short}}
        CFBundleVersion: {{apple.bundle-version}}
    # Entitlements are hand-maintained files, one per flavor, selected by the
    # per-config CODE_SIGN_ENTITLEMENTS in settingGroups: the release file
    # (dayjot-desktop_iOS.entitlements) carries iCloud Drive document storage
    # (Plan 21, CloudDocuments only, no CloudKit database) plus the App Group
    # shared with ShareExtension (the share sheet spools capture envelopes
    # into the container's inbox/ and the app relays them into the graph's
    # .dayjot/inbox/ on launch/foreground, Plan 11); the dev file
    # (dayjot-desktop_iOS.dev.entitlements) carries only the dev App Group.
    # There is deliberately no xcodegen `entitlements:` block: it would force
    # one file onto every configuration (its implicit CODE_SIGN_ENTITLEMENTS
    # beats explicit per-config settings), and without one xcodegen leaves
    # the committed files alone, so regens cannot wipe them (the failure mode
    # in docs/porting/reflect-mobile/share-extension.md).
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        SWIFT_VERSION: "5.0"
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      # The share-sheet capture extension (Plan 11's iOS producer): embedded
      # into the app bundle and signed with it.
      - target: ShareExtension
        embed: true
        embed: true
      - framework: libapp.a
        embed: false
      # libgit2 (vendored into libapp.a) needs zlib and iconv at the final
      # Xcode link — cargo's `rustc-link-lib` directives don't reach
      # xcodebuild. iconv backs libgit2's Apple filename-precompose support.
      - sdk: libz.tbd
      - sdk: libiconv.tbd
      # objc2-contacts' link directive doesn't reach xcodebuild either.
      - sdk: Contacts.framework
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: CI=true pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
  # The share-sheet capture extension: saves links/text shared from any app
  # into the App Group inbox (`group.app.dayjot`), entirely offline; the main
  # app relays + drains on next launch/foreground (Plan 11's envelope model).
  # Swift only — no Rust, no webview, no network.
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension/ShareViewController.swift
      - path: ShareExtension/ShareState.swift
      - path: ShareExtension/ShareView.swift
      - path: ShareExtension/CaptureInbox.swift
      # The Safari preprocessor (title/URL/selection/meta description); a
      # bundle resource the NSExtension attributes reference by base name.
      - path: ShareExtension/ExtensionClass.js
        buildPhase: resources
    info:
      path: ShareExtension/Info.plist
      properties:
        # The share sheet's row label (the icon comes from the host app).
        CFBundleDisplayName: $(DAYJOT_DISPLAY_NAME)
        CFBundleShortVersionString: {{apple.bundle-version-short}}
        CFBundleVersion: {{apple.bundle-version}}
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          # Storyboard-less principal class; `@objc(ShareViewController)`
          # pins the runtime name the plist references.
          NSExtensionPrincipalClass: ShareViewController
          NSExtensionAttributes:
            # Dictionary version 2 allows subset matching — Chrome shares a
            # URL *and* text, which version 1's exact match would refuse
            # (V1 parity; see the porting doc).
            NSExtensionActivationRule:
              NSExtensionActivationDictionaryVersion: 2
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
            NSExtensionJavaScriptPreprocessingFile: ExtensionClass
    # The extension's only capability: the App Group container it spools
    # capture envelopes into. Must match the main app's entry per flavor (the
    # app reads the same container to relay envelopes into the graph). The
    # hand-maintained entitlement files are selected per config below; see
    # the main target's comment for why there is no `entitlements:` block.
    settings:
      base:
        PRODUCT_NAME: ShareExtension
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 789ULN5MZB
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1,2
      # An appex bundle id must be prefixed by its containing app's bundle
      # id, so the extension follows the app's flavor (see settingGroups).
      configs:
        debug:
          PRODUCT_BUNDLE_IDENTIFIER: app.dayjot.ios.dev.share
          DAYJOT_DISPLAY_NAME: DayJot Dev
          CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.dev.entitlements
        release:
          PRODUCT_BUNDLE_IDENTIFIER: app.dayjot.ios.share
          DAYJOT_DISPLAY_NAME: DayJot
          CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
    postBuildScripts:
      # Tauri's App Store Connect API-key flow (CI TestFlight builds) archives
      # with code signing disabled, then dummy-signs only the app binary before
      # export. Xcode's export re-signing preserves only entitlements already
      # present in a signature, so an unsigned appex ships without the App
      # Group entitlement — the container lookup returns nil and every share
      # fails with "Couldn't save" (tauri-cli mobile/ios/build.rs). Ad-hoc
      # signing the extension with its entitlements here keeps them through
      # export; properly signed builds never enter the branch.
      - script: |
          if [ "${CODE_SIGNING_ALLOWED:-YES}" = "NO" ]; then
            /usr/bin/codesign --force --sign - \
              --entitlements "${SRCROOT:?}/ShareExtension/ShareExtension.entitlements" \
              "${CODESIGNING_FOLDER_PATH:?}"
          fi
        name: Preserve entitlements on skip-codesign builds
        basedOnDependencyAnalysis: false
