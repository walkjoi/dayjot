[package]
name = "reflect-open"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "reflect_open_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.40.1", features = ["bundled"] }
sqlite-vec = "0.1.9"
tempfile = "3.27.0"
trash = "5.2.6"
dirs = "6.0.0"
tauri-plugin-dialog = "2.7.1"
rusqlite_migration = "2.6.0"
notify = "8.2.0"
notify-debouncer-full = "0.7.0"
base64 = "0.22.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
fastembed = "5"
# Direct dependency on fastembed's own downloader, used to pre-fetch the
# embedding model with byte-level progress (fastembed downloads silently).
hf-hub = { version = "0.5.0", default-features = false, features = ["ureq", "native-tls"] }
keyring = { version = "3", features = [
  "apple-native",
  "windows-native",
  "sync-secret-service",
] }
tauri-plugin-http = "2.5.9"
tauri-plugin-window-state = "2"

[dev-dependencies]
tauri = { version = "2", features = ["test"] }

