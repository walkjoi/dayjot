<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--space-black); font-family: var(--font-sans); }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: .04em; color: var(--purple-light); margin: 0 0 14px; }
  h1 { margin: 0 0 6px; font-size: var(--display-md); font-weight: var(--weight-semibold); letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); color: #fff; }
  .sub { margin: 10px 0 0; font-size: var(--text-lg); color: rgba(255,255,255,.6); font-weight: 400; }
  .meta { margin-top: 18px; font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,.4); }
</style>
</head>
<body>
  <p class="eyebrow">DayJot AI</p>
  <h1>Think better with DayJot</h1>
  <p class="sub">Never miss a note, idea or connection.</p>
  <p class="meta">--display-md / 56px · weight 600 · tracking -0.02em · line-height 1.15</p>
</body>
</html>
