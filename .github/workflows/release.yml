name: Release

on:
  # The normal path: called by release-please.yml right after it creates the
  # draft release for a merged Release PR.
  workflow_call:
    inputs:
      tag:
        description: The release tag (v<version>) created by release-please
        type: string
        required: true
      commit:
        description: Immutable commit targeted by the release tag
        type: string
        required: true
  # Manual fallback and retry path: run on a branch (or commit) whose version
  # was already bumped by a merged PR; the tag is derived from
  # apps/desktop/package.json.
  workflow_dispatch:
    inputs:
      draft:
        description: Create the GitHub release as a draft for review
        type: boolean
        default: false

# Never run two releases at once, and never cancel one mid-notarization —
# queue instead. A cancelled run can leave a half-published release behind.
concurrency:
  group: release
  cancel-in-progress: false

# Publish uploads assets into the release-please draft release and undrafts
# it; the manual fallback path still creates the release itself via
# `gh release create`.
permissions:
  contents: write

jobs:
  preflight:
    name: Preflight release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Reusable workflows inherit the caller SHA, which may be newer or
          # older than the release. Build the verified immutable tag commit.
          ref: ${{ inputs.commit || github.sha }}
          # Unlike CI, credentials stay: the publish preflights run
          # `git ls-remote` against origin. Full history so the
          # HEAD-is-on-an-origin-branch check also passes on release commits.
          persist-credentials: true
          fetch-depth: 0

      # The release is tagged v<version> from apps/desktop/package.json (the
      # single version source; tauri.conf.json points at it). When called from
      # release-please.yml, the tag it created must match the checked-out
      # commit's version, or the assets would publish under the wrong name.
      - name: Verify the release tag matches apps/desktop/package.json
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          version="$(jq -r .version apps/desktop/package.json)"
          tag="${INPUT_TAG:-v${version}}"
          if [ "$tag" != "v${version}" ]; then
            echo "::error::release tag ${tag} but apps/desktop/package.json says ${version} — run this workflow on the release commit"
            exit 1
          fi

      - name: Verify release can publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: node apps/desktop/scripts/release-macos.mjs preflight

  macos:
    name: Build · sign · notarize (${{ matrix.name }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    env:
      # Cargo registry fetches can intermittently fail on GitHub macOS runners
      # with curl HTTP/2 framing errors. HTTP/1.1 is slower but steadier for
      # release builds, where determinism matters more than a small fetch win.
      CARGO_HTTP_MULTIPLEXING: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-26
            target: aarch64-apple-darwin
          - name: Intel
            runner: macos-26
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.commit || github.sha }}
          persist-credentials: false

      # Without the certificate, signing only fails at codesign time — after
      # the whole Rust build. Check every required secret up front instead.
      # docs/macos-distribution.md describes how to produce each one.
      - name: Verify release secrets are configured
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          missing=()
          for name in APPLE_SIGNING_IDENTITY APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD SENTRY_AUTH_TOKEN SENTRY_DSN TAURI_SIGNING_PRIVATE_KEY; do
            [ -n "${!name}" ] || missing+=("$name")
          done
          if { [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_ISSUER" ] || [ -z "$APPLE_API_KEY_CONTENT" ]; } &&
            { [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ]; }; then
            missing+=("APPLE_API_KEY+APPLE_API_ISSUER+APPLE_API_KEY_CONTENT (or APPLE_ID+APPLE_PASSWORD)")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::missing release secret(s): ${missing[*]} — see docs/macos-distribution.md"
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Scope the Rust cache to Xcode
        run: |
          set -euo pipefail

          clang="$(xcrun --find clang)"
          resource_dir="$("$clang" --print-resource-dir)"
          runtime="$resource_dir/lib/darwin/libclang_rt.osx.a"
          if [ ! -f "$runtime" ]; then
            echo "::error::missing clang runtime at ${runtime}"
            exit 1
          fi
          compiler_hash="$("$clang" --version | shasum -a 256 | cut -d ' ' -f 1)"
          echo "CC=$clang" >> "$GITHUB_ENV"
          echo "RUST_CACHE_XCODE=$compiler_hash" >> "$GITHUB_ENV"

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.runner }}-${{ matrix.target }}
          # A failed notarization still compiled everything; keep the cache.
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The release script takes APPLE_API_KEY_PATH (a .p8 file on disk), so
      # materialize the key content outside the workspace.
      - name: Stage the App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/apple-api-key.p8"
            echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple-api-key.p8" >> "$GITHUB_ENV"
          fi

      # Tauri signs the .app; the script then repairs sidecar signatures,
      # notarizes + staples the app and DMG, signs the updater archive, and
      # runs the Gatekeeper checks.
      - name: Build, sign and notarize
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: pnpm release:macos build --target=${{ matrix.target }} --artifact-dir="$RUNNER_TEMP/release-artifacts"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-release-${{ matrix.target }}
          path: ${{ runner.temp }}/release-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: macos
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.channel.outputs.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.commit || github.sha }}
          # Full history so the HEAD-is-on-an-origin-branch check passes on the
          # release commit, and credentials stay for gh/git release preflights.
          persist-credentials: true
          fetch-depth: 0

      - name: Determine release channel
        id: channel
        run: |
          version="$(jq -r .version apps/desktop/package.json)"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: macos-release-*
          path: ${{ runner.temp }}/release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass the boolean flag through an env variable so the shell never
          # interpolates ${{ }} expressions directly into the run command.
          DRAFT_FLAG: ${{ inputs.draft && '--draft' || '' }}
        run: |
          args=(publish --defer-beta-feed --from-artifacts="$RUNNER_TEMP/release-artifacts")
          if [ -n "$DRAFT_FLAG" ]; then
            args+=("$DRAFT_FLAG")
          fi
          node apps/desktop/scripts/release-macos.mjs "${args[@]}"

  sync-beta-feed:
    name: Sync beta downloads and updater feed
    needs: publish
    if: needs.publish.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.commit || github.sha }}
          persist-credentials: true
          fetch-depth: 0

      # This is separate from publish so a transient moving-asset failure can
      # be retried without rebuilding or touching the immutable tagged release.
      - name: Sync beta downloads and updater feed
        env:
          GH_TOKEN: ${{ github.token }}
        run: node apps/desktop/scripts/release-macos.mjs sync-beta-feed
