name: TestFlight

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: Xcode export method for the IPA.
        required: true
        type: choice
        default: app-store-connect
        options:
          - app-store-connect
          - release-testing
      wait_for_processing:
        description: Wait for App Store Connect processing before finishing.
        required: true
        type: boolean
        default: true
  # Called by release-please.yml so every published release also ships to
  # TestFlight. workflow_call has no choice type; release-ios.mjs validates
  # the export method.
  workflow_call:
    inputs:
      commit:
        description: Immutable commit targeted by the release tag.
        required: true
        type: string
      export_method:
        description: Xcode export method for the IPA (app-store-connect or release-testing).
        required: false
        type: string
        default: app-store-connect
      wait_for_processing:
        description: Wait for App Store Connect processing before finishing.
        required: false
        type: boolean
        default: true

# TestFlight uploads should be serialized so build numbers and App Store
# Connect processing don't race each other. This also holds when the workflow
# is called from release-please.yml; keep the group name hardcoded, since a
# `github.workflow` group would resolve to the caller's name there.
concurrency:
  group: testflight
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  testflight:
    name: Build and upload iOS
    runs-on: macos-26
    timeout-minutes: 120
    env:
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Reusable workflows inherit the caller SHA, which may not be the
          # release snapshot. Always build the verified immutable tag commit.
          ref: ${{ inputs.commit || github.sha }}
          persist-credentials: false

      - name: Verify TestFlight secrets are configured
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          missing=()
          for name in APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_CONTENT; do
            [ -n "${!name}" ] || missing+=("$name")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::missing TestFlight secret(s): ${missing[*]} — see docs/ios-testflight.md"
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve build number
        run: |
          build_number="$(date -u +%Y%m%d%H%M)"
          echo "BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"
          echo "Using TestFlight CFBundleVersion $build_number"

      - name: Build and upload to TestFlight
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          EXPORT_METHOD: ${{ inputs.export_method }}
          WAIT_FLAG: ${{ inputs.wait_for_processing && '--wait' || '' }}
        run: |
          pnpm release:ios preflight --build-number="$BUILD_NUMBER"
          args=(testflight --build-number="$BUILD_NUMBER" --export-method="$EXPORT_METHOD")
          if [ -n "$WAIT_FLAG" ]; then
            args+=("$WAIT_FLAG")
          fi
          pnpm release:ios "${args[@]}"

      # The exported IPA, kept for post-hoc signing/entitlements inspection —
      # TestFlight builds cannot be downloaded back from App Store Connect.
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dayjot-ios-ipa
          path: apps/desktop/src-tauri/gen/apple/build/arm64/*.ipa
          if-no-files-found: ignore
